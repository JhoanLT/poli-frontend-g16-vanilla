<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poli Service Hub</title>
    <meta name="description" content="Catalogo de servicios digitales con favoritos, contacto y gestion basica." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#112033',
              slate: '#49617D',
              cream: '#F8F3EA',
              coral: '#F26A4B',
              teal: '#0F8B8D',
              sand: '#E7D7C1',
              gold: '#F3B63A',
            },
            fontFamily: {
              display: ['"Space Grotesk"', 'sans-serif'],
              body: ['"Manrope"', 'sans-serif'],
            },
            boxShadow: {
              soft: '0 18px 50px rgba(17, 32, 51, 0.12)',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="font-body text-ink">
    <div id="app">
      <header id="header"></header>
      <main id="main" class="min-h-screen"></main>
      <footer id="footer"></footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/services.js"></script>
    <script src="js/pages/serviceDetail.js"></script>
    <script src="js/pages/favorites.js"></script>
    <script src="js/pages/contact.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
